<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>RecruiterBOT</title>
<style>
  :root{
    --primary:#0a66c2; --primary-dark:#084b8a; --card:#fff;
    --line:#d8e3f2; --muted:#5f6b7a; --text:#1f2933;
    --success:#1e8e4a; --danger:#c43636; --warn:#b45309;
  }
  body{width:430px;margin:0;padding:14px;background:linear-gradient(180deg,#f5f8fc,#e8eff8);font-family:"Segoe UI",sans-serif;color:var(--text);}
  .box{background:var(--card);padding:16px;border-radius:16px;box-shadow:0 14px 34px rgba(10,102,194,.12);border:1px solid rgba(10,102,194,.08);}
  h3{color:var(--primary);margin:0 0 4px;font-size:20px;text-align:center;}
  .sub{font-size:11px;color:var(--muted);text-align:center;margin:0 0 12px;}
  label{display:block;margin-top:12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
  textarea,input[type=text]{width:100%;box-sizing:border-box;margin-top:6px;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:#fbfdff;font-size:12px;color:var(--text);font-family:inherit;}
  textarea{resize:none;}
  textarea:focus,input:focus{outline:none;border-color:rgba(10,102,194,.5);box-shadow:0 0 0 3px rgba(10,102,194,.12);}
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
  button{border:none;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;padding:11px;transition:.18s;}
  button:disabled{opacity:.55;cursor:not-allowed;}
  button:hover:not(:disabled){transform:translateY(-1px);}
  .btn-primary{background:linear-gradient(135deg,#0a66c2,#0857a5);color:#fff;box-shadow:0 8px 18px rgba(10,102,194,.22);}
  .btn-secondary{background:#eef5ff;color:var(--primary);border:1px solid #cfe0ff;}
  .btn-bulk{width:100%;margin-top:14px;background:linear-gradient(135deg,#1e8e4a,#15703a);color:#fff;box-shadow:0 8px 18px rgba(30,142,74,.22);}
  .btn-bulk:disabled{background:#cdd7df;box-shadow:none;}
  .btn-link{width:100%;margin-top:8px;background:transparent;color:var(--primary);border:1px dashed #cfe0ff;}
  .clear{padding:6px 10px;background:#fff;border:1px solid #f0b8b8;color:var(--danger);font-size:11px;border-radius:8px;}
  .footer-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
  #status{margin-top:12px;min-height:16px;text-align:center;font-size:11px;font-weight:700;color:var(--primary);}
  #kandidatiList,#outreachList{max-height:180px;overflow-y:auto;margin-top:8px;padding:8px;background:#fbfdff;border:1px solid var(--line);border-radius:10px;}
  .row{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:1px solid #edf2f7;font-size:11px;}
  .row:last-child{border-bottom:none;}
  .score{min-width:38px;font-weight:700;color:var(--primary);}
  .cname{flex:1;overflow:hidden;}
  .cname .name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cname .reason{color:#475569;font-size:10px;line-height:1.35;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .badge{display:inline-block;margin:2px 3px 0 0;padding:2px 6px;border-radius:999px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;}
  .badge-strong{background:#dff6e8;color:#166534;}
  .badge-weak{background:#fff4d6;color:#8a4b00;}
  .badge-outreach{background:#eef5ff;color:#0a66c2;}
  .badge-pending{background:#fff4d6;color:#8a4b00;}
  .badge-failed{background:#ffe8e8;color:#9f1239;}
  .badge-prepared{background:#dff6e8;color:#166534;}
  .empty{text-align:center;color:#7b8794;font-size:11px;padding:10px 0;}
  .section-divider{margin:14px -16px 0;border-top:1px solid #e1eaf5;}
  .banner{margin-top:10px;padding:8px 10px;border-radius:8px;font-size:11px;line-height:1.4;}
  .banner.warn{background:#fff4e0;color:var(--warn);border:1px solid #f4c27a;}
  .banner.info{background:#eef5ff;color:var(--primary);border:1px solid #cfe0ff;}
  .counter{margin-top:10px;font-size:11px;color:var(--muted);text-align:right;}
</style>
</head>
<body>
<div class="box">
  <h3>RecruiterBOT</h3>
  <p class="sub">AI sourcing - shortlist review - prepare-only outreach</p>

  <div id="apiBanner" class="banner warn" style="display:none;"
    data-testid="popup-api-banner">
    No Gemini API key configured. <a href="#" id="openOptionsLink"
    data-testid="popup-open-options-link">Open Options →</a>
  </div>

  <label for="jdInput">1. Job Description</label>
  <textarea id="jdInput" style="height:84px;" placeholder="Paste the JD here..."
    data-testid="popup-jd-input"></textarea>

  <button id="findCandidatesBtn" class="btn-primary" style="width:100%;margin-top:10px;font-size:14px;padding:13px;"
    data-testid="popup-find-candidates-btn">🚀 Find candidates (1-click)</button>

  <div class="actions" style="margin-top:8px;">
    <button id="booleanBtn" class="btn-secondary" data-testid="popup-boolean-btn">🧠 Boolean only</button>
    <button id="linkedinSearchBtn" class="btn-secondary" data-testid="popup-linkedin-search-btn">🔍 LinkedIn search</button>
  </div>

  <label for="booleanBox">Boolean X-Ray (auto-generated)</label>
  <textarea id="booleanBox" style="height:60px;" placeholder="Boolean query will appear here..."
    data-testid="popup-boolean-box"></textarea>

  <label>2. Search shortlist</label>
  <div id="kandidatiList" data-testid="popup-queue-list"></div>

  <div class="section-divider"></div>

  <label for="msgInput">3. Outreach prep message (max 300 chars, use {name})</label>
  <textarea id="msgInput" style="height:64px;" placeholder="Hi {name}, ..."
    data-testid="popup-msg-input"></textarea>

  <label>4. Outreach queue / preparation status</label>
  <div id="outreachList" data-testid="popup-outreach-list"></div>

  <button id="startBulkBtn" class="btn-bulk" disabled data-testid="popup-start-bulk-btn">
    PREPARE PROFILES (0)
  </button>
  <button id="stopBulkBtn" class="btn-link" style="display:none;" data-testid="popup-stop-bulk-btn">
    ⏹ Stop automation
  </button>

  <div class="counter" data-testid="popup-daily-counter"><span id="dailyText">Today sent: 0/0</span></div>

  <div class="footer-row">
    <button id="clearBtn" class="clear" data-testid="popup-clear-btn">Clear queue</button>
    <button id="dryRunBtn" class="clear" style="border-color:#cfe0ff;color:var(--primary);"
      data-testid="popup-dryrun-btn">🧪 Dry Run</button>
    <button id="optionsBtn" class="clear" style="border-color:#cfe0ff;color:var(--primary);"
      data-testid="popup-options-btn">⚙ Options</button>
  </div>

  <div id="status" data-testid="popup-status"></div>
</div>

<script src="shared/debug.js"></script>
<script src="shared/storage.js"></script>
<script src="shared/gemini.js"></script>
<script src="shared/candidates.js"></script>
<script src="prompts.js"></script>
<script src="popup.js"></script>
</body>
</html>
